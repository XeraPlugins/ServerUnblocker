name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.6.1

      - name: Build all versions
        run: gradle chiseledBuild

      - name: Collect release jars
        run: |
          mkdir -p release-assets
          find versions -path "*/build/libs/serverunblocker-mc-*.jar" ! -name "*-sources.jar" -exec cp {} release-assets/ \;
          test -n "$(find release-assets -name '*.jar' -print -quit)"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ServerUnblocker ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
